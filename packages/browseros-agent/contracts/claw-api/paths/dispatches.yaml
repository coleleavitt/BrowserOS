screenshot:
  get:
    operationId: getDispatchScreenshot
    parameters:
      - $ref: ../parameters.yaml#/DispatchId
    responses:
      '200':
        description: Persisted dispatch JPEG.
        content:
          image/jpeg:
            schema:
              type: string
              format: binary
      '400':
        $ref: ../responses.yaml#/BadRequest
      '404':
        $ref: ../responses.yaml#/NotFound
      '500':
        $ref: ../responses.yaml#/InternalError
