openapi: 3.0.3
info:
  title: BrowserClaw API
  version: 1.0.0
  description: Implementation-neutral REST contract shared by BrowserClaw clients and servers.
servers:
  - url: http://127.0.0.1:9200
paths:
  /system/health:
    $ref: ./paths/system.yaml#/health
  /system/shutdown:
    $ref: ./paths/system.yaml#/shutdown
  /api/v1/system:
    $ref: ./paths/system.yaml#/info
  /api/v1/settings/telemetry:
    $ref: ./paths/settings.yaml#/telemetry
  /api/v1/sessions:
    $ref: ./paths/sessions.yaml#/collection
  /api/v1/sessions/{sessionId}:
    $ref: ./paths/sessions.yaml#/detail
  /api/v1/sessions/{sessionId}/cancel:
    $ref: ./paths/sessions.yaml#/cancel
  /api/v1/sessions/{sessionId}/recording:
    $ref: ./paths/recordings.yaml#/metadata
  /api/v1/sessions/{sessionId}/recording/events:
    $ref: ./paths/recordings.yaml#/events
  /api/v1/recordings/events:
    $ref: ./paths/recordings.yaml#/ingest
  /api/v1/sessions/{sessionId}/browser-tabs/{browserTabId}/preview:
    $ref: ./paths/sessions.yaml#/browserTabPreview
  /api/v1/dispatches/{dispatchId}/screenshot:
    $ref: ./paths/dispatches.yaml#/screenshot
  /api/v1/connections:
    $ref: ./paths/connections.yaml#/collection
  /api/v1/connections/{harness}:
    $ref: ./paths/connections.yaml#/harness
components:
  parameters:
    SessionId:
      $ref: ./parameters.yaml#/SessionId
    BrowserTabId:
      $ref: ./parameters.yaml#/BrowserTabId
    DispatchId:
      $ref: ./parameters.yaml#/DispatchId
    Harness:
      $ref: ./parameters.yaml#/Harness
    RecordingTabId:
      $ref: ./parameters.yaml#/RecordingTabId
    RecordingDocumentId:
      $ref: ./parameters.yaml#/RecordingDocumentId
    RecordingBatchId:
      $ref: ./parameters.yaml#/RecordingBatchId
    RecordingGap:
      $ref: ./parameters.yaml#/RecordingGap
  responses:
    BadRequest:
      $ref: ./responses.yaml#/BadRequest
    NotFound:
      $ref: ./responses.yaml#/NotFound
    Conflict:
      $ref: ./responses.yaml#/Conflict
    Gone:
      $ref: ./responses.yaml#/Gone
    PayloadTooLarge:
      $ref: ./responses.yaml#/PayloadTooLarge
    InternalError:
      $ref: ./responses.yaml#/InternalError
  schemas:
    ApiError:
      $ref: ./schemas/common.yaml#/ApiError
    HealthResponse:
      $ref: ./schemas/system.yaml#/HealthResponse
    ShutdownResponse:
      $ref: ./schemas/system.yaml#/ShutdownResponse
    SystemInfo:
      $ref: ./schemas/system.yaml#/SystemInfo
    SystemCapabilities:
      $ref: ./schemas/system.yaml#/SystemCapabilities
    TelemetryState:
      $ref: ./schemas/settings.yaml#/TelemetryState
    UpdateTelemetryRequest:
      $ref: ./schemas/settings.yaml#/UpdateTelemetryRequest
    SessionStatus:
      $ref: ./schemas/sessions.yaml#/SessionStatus
    LiveSessionActivityState:
      $ref: ./schemas/sessions.yaml#/LiveSessionActivityState
    LiveSessionState:
      $ref: ./schemas/sessions.yaml#/LiveSessionState
    SessionBrowserTab:
      $ref: ./schemas/sessions.yaml#/SessionBrowserTab
    SessionSummary:
      $ref: ./schemas/sessions.yaml#/SessionSummary
    SessionList:
      $ref: ./schemas/sessions.yaml#/SessionList
    SessionDetail:
      $ref: ./schemas/sessions.yaml#/SessionDetail
    Dispatch:
      $ref: ./schemas/dispatches.yaml#/Dispatch
    CancelSessionResponse:
      $ref: ./schemas/sessions.yaml#/CancelSessionResponse
    RecordingMetadata:
      $ref: ./schemas/recordings.yaml#/RecordingMetadata
    RecordingTabMetadata:
      $ref: ./schemas/recordings.yaml#/RecordingTabMetadata
    RecordingSegmentMetadata:
      $ref: ./schemas/recordings.yaml#/RecordingSegmentMetadata
    AppendRecordingEventsResponse:
      $ref: ./schemas/recordings.yaml#/AppendRecordingEventsResponse
    ToolEvent:
      $ref: ./schemas/sessions.yaml#/ToolEvent
    Harness:
      $ref: ./schemas/connections.yaml#/Harness
    Connection:
      $ref: ./schemas/connections.yaml#/Connection
    ConnectionList:
      $ref: ./schemas/connections.yaml#/ConnectionList
