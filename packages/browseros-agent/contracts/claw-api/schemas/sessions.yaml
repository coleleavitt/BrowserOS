SessionStatus:
  type: string
  enum: [live, done, failed]
LiveSessionActivityState:
  type: string
  enum: [active, idle]
ToolEvent:
  type: object
  additionalProperties: false
  required: [name, at]
  properties:
    name:
      type: string
    at:
      type: integer
      format: int64
SessionBrowserTab:
  type: object
  additionalProperties: false
  required: [browserTabId, url, title, toolCount, recentTools]
  properties:
    browserTabId:
      type: integer
      format: int64
      minimum: 1
    url:
      type: string
    title:
      type: string
    firstActivityAt:
      type: integer
      format: int64
    lastActivityAt:
      type: integer
      format: int64
    lastToolName:
      type: string
    toolCount:
      type: integer
      format: int64
      minimum: 0
    recentTools:
      type: array
      items:
        $ref: '#/ToolEvent'
LiveSessionState:
  type: object
  additionalProperties: false
  required: [state, browserTabs]
  properties:
    state:
      $ref: '#/LiveSessionActivityState'
    browserTabs:
      type: array
      items:
        $ref: '#/SessionBrowserTab'
SessionSummary:
  type: object
  additionalProperties: false
  required:
    - sessionId
    - slug
    - label
    - name
    - startedAt
    - durationMs
    - dispatchCount
    - toolSequence
    - status
    - errorCount
  properties:
    sessionId:
      type: string
    profileId:
      type: string
    harness:
      type: string
    color:
      type: string
    slug:
      type: string
    label:
      type: string
    name:
      type: string
    site:
      type: string
    startedAt:
      type: integer
      format: int64
    endedAt:
      type: integer
      format: int64
    durationMs:
      type: integer
      format: int64
      minimum: 0
    dispatchCount:
      type: integer
      format: int64
      minimum: 0
    toolSequence:
      type: array
      items:
        type: string
    status:
      $ref: '#/SessionStatus'
    errorCount:
      type: integer
      format: int64
      minimum: 0
    latestScreenshotId:
      type: integer
      format: int64
      minimum: 1
    live:
      allOf:
        - $ref: '#/LiveSessionState'
      description: Present only on summaries returned by an explicit `status=live` list query.
SessionList:
  type: object
  additionalProperties: false
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/SessionSummary'
    nextCursor:
      type: integer
      format: int64
      minimum: 1
      description: Cursor for a subsequent historical query. Omitted from complete live snapshots.
SessionDetail:
  type: object
  additionalProperties: false
  required: [session, dispatches]
  properties:
    session:
      $ref: '#/SessionSummary'
    dispatches:
      type: array
      items:
        $ref: ./dispatches.yaml#/Dispatch
SessionScreenshot:
  type: object
  additionalProperties: false
  required: [screenshotId, capturedAt, toolName]
  properties:
    screenshotId:
      type: integer
      format: int64
      minimum: 1
    capturedAt:
      type: integer
      format: int64
    toolName:
      type: string
SessionScreenshotList:
  type: object
  additionalProperties: false
  required: [items]
  properties:
    items:
      type: array
      items:
        $ref: '#/SessionScreenshot'
CancelSessionResponse:
  type: object
  additionalProperties: false
  required: [cancelled]
  properties:
    cancelled:
      type: integer
      format: int64
      minimum: 0
