RecordingMetadata:
  type: object
  additionalProperties: false
  required: [hasData, complete, sizeBytes, tabs]
  properties:
    hasData:
      type: boolean
    complete:
      type: boolean
      description: False when any selected segment has a known gap or legacy boundaries.
    sizeBytes:
      type: integer
      format: int64
      minimum: 0
    firstEventAt:
      type: integer
      format: int64
    lastEventAt:
      type: integer
      format: int64
    tabs:
      type: array
      items:
        $ref: '#/RecordingTabMetadata'
RecordingTabMetadata:
  type: object
  additionalProperties: false
  required: [tabId, complete, firstEventAt, lastEventAt, segments]
  properties:
    tabId:
      type: integer
      format: int64
      minimum: 1
    complete:
      type: boolean
    firstEventAt:
      type: integer
      format: int64
    lastEventAt:
      type: integer
      format: int64
    segments:
      type: array
      items:
        $ref: '#/RecordingSegmentMetadata'
RecordingSegmentMetadata:
  type: object
  additionalProperties: false
  required:
    - documentId
    - firstEventAt
    - lastEventAt
    - sizeBytes
    - eventCount
    - hasGap
  properties:
    documentId:
      type: string
    targetId:
      type: string
    firstEventAt:
      type: integer
      format: int64
    lastEventAt:
      type: integer
      format: int64
    sizeBytes:
      type: integer
      format: int64
      minimum: 0
    eventCount:
      type: integer
      format: int64
      minimum: 0
    hasGap:
      type: boolean
    legacy:
      type: boolean
      description: True when the source predates trustworthy Chrome document identity.
AppendRecordingEventsResponse:
  type: object
  additionalProperties: false
  required: [accepted]
  properties:
    accepted:
      type: integer
      format: int64
      minimum: 0
